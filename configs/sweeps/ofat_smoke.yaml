# Smoke OFAT: valida el cableado (expand + agregación + gráfica) en ~40s. No es un experimento.
name: ofat_smoke
base: configs/models/mlp_full.yaml
mode: ofat

baseline:
  train.epochs: 1
  train.lr: 0.003
  train.batch_size: 256
  model.hidden: [64]
  model.dropout: 0.0

axes:
  train.lr: [0.01]

seeds: [0, 1]
