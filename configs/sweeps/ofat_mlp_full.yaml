# BATERÍA OFAT (un factor a la vez) para el MLP sobre imagen completa.
# Baseline fijo; se varía UN eje cada vez. Cada config se repite con 5 semillas (init de pesos;
# el split de datos sigue congelado). Se agrega mean±std por configuración.
#   8 configuraciones (1 baseline + 2 lr + 2 hidden + 2 batch + 1 dropout) x 5 semillas = 40 corridas.
name: ofat_mlp_full
base: configs/models/mlp_full.yaml
mode: ofat

baseline:
  train.epochs: 25
  train.lr: 0.003
  train.batch_size: 128
  model.hidden: [128]
  model.dropout: 0.0

axes:
  train.lr: [0.01, 0.001]
  model.hidden: [[64], [256, 128]]
  train.batch_size: [64, 256]
  model.dropout: [0.2]

seeds: [0, 1, 2, 3, 4]
