# CNN sobre el dataset sintético RECTAS vs CURVAS (2 clases). Base para la escalera de crecimiento.
name: cnn_shapes
extends: ../base.yaml

dataset:
  name: lines_curves     # rectas (clase 0) vs curvas (clase 1); test disjunto aparte
  val_fraction: 0.2
  split_seed: 0
  n_train_per_class: 30    # 30+30 reales; baja variabilidad -> bastan para generalizar
  n_test_per_class: 100    # test disjunto amplio (otra semilla) para métrica fiable

train:
  epochs: 15
  lr: 0.001
  batch_size: 16         # el pool de train es pequeño (48 imgs) -> lotes pequeños

model:
  name: cnn
  channels: [8]
  kernel_size: 3
  fc_hidden: 32
  batchnorm: false
  dropout: 0.0
